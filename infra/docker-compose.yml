version: "3.9"

services:
  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      - redis

  agent-api:
    build:
      context: ../apps/agent-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ../apps/agent-api
    env_file:
      - ../.env
    depends_on:
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build:
      context: ../apps/agent-api
    env_file:
      - ../.env
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - agent-api

volumes:
  redis_data:
