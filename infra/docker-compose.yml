name: vieroclick

services:
  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../.env
    environment:
      # Re-enable the passwordless dev-bypass login on this deployment.
      # WARNING: anyone reaching the site can sign in as any email.
      ALLOW_DEV_BYPASS: "true"
    depends_on:
      - redis

  agent-api:
    build:
      context: ../apps/agent-api
    env_file:
      - ../.env
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../apps/agent-api
    env_file:
      - ../.env
    depends_on:
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  scheduler:
    build:
      context: ../apps/agent-api
    env_file:
      - ../.env
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    ports:
      - "1988:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - agent-api

volumes:
  redis_data:
