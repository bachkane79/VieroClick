<style>
:root{
  --canvas:#faf9f7;--surface:#fff;--surface-2:#f5f3f0;--surface-3:#efece7;
  --ink:#1c1a17;--ink-2:#57524b;--ink-muted:#8a837a;--hairline:#ebe8e3;
  --primary:#ea6100;--primary-hover:#cc5500;--primary-soft:#fff1e6;--on-primary:#fff;
  --coral:#ff6a5f;--coral-soft:#ffe9e6;--peach:#f59042;--peach-soft:#fff0e2;
  --lav:#8b78e0;--lav-soft:#efeaff;--sky:#3f92e3;--sky-soft:#e6f1fd;--mint:#2ba86f;--mint-soft:#e2f5ec;
  --good:#1aae39;--warn:#c47a00;--crit:#e5484d;--crit-soft:#fdeaea;
  --grad:linear-gradient(150deg,#ff8a3d 0%,#ff6a5f 52%,#8b78e0 100%);
  --shadow-sm:0 1px 2px rgba(28,26,23,.06),0 1px 3px rgba(28,26,23,.05);
  --shadow-md:0 4px 12px rgba(28,26,23,.08),0 2px 4px rgba(28,26,23,.05);
  --shadow-lg:0 12px 34px rgba(28,26,23,.14),0 4px 10px rgba(28,26,23,.08);
  --r-sm:5px;--r-md:8px;--r-full:9999px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Apple Color Emoji",sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --canvas:#171512;--surface:#221f1a;--surface-2:#2a2620;--surface-3:#332e27;
  --ink:#f7f4ee;--ink-2:#cbc4b9;--ink-muted:#948d82;--hairline:#37312a;
  --primary:#ff8636;--primary-hover:#ff9a55;--primary-soft:#3a2413;--on-primary:#1c1206;
  --coral:#ff8177;--coral-soft:#3a221f;--peach:#f5a463;--peach-soft:#382517;
  --lav:#a794f2;--lav-soft:#241f38;--sky:#6aabee;--sky-soft:#16253a;--mint:#4cc088;--mint-soft:#15291f;
  --good:#3fd15f;--warn:#e0a53a;--crit:#ff6b6f;--crit-soft:#3a1e1f;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);--shadow-md:0 4px 14px rgba(0,0,0,.45);--shadow-lg:0 16px 40px rgba(0,0,0,.55);
}}
:root[data-theme="light"]{
  --canvas:#faf9f7;--surface:#fff;--surface-2:#f5f3f0;--surface-3:#efece7;
  --ink:#1c1a17;--ink-2:#57524b;--ink-muted:#8a837a;--hairline:#ebe8e3;
  --primary:#ea6100;--primary-hover:#cc5500;--primary-soft:#fff1e6;--on-primary:#fff;
  --coral:#ff6a5f;--coral-soft:#ffe9e6;--peach:#f59042;--peach-soft:#fff0e2;
  --lav:#8b78e0;--lav-soft:#efeaff;--sky:#3f92e3;--sky-soft:#e6f1fd;--mint:#2ba86f;--mint-soft:#e2f5ec;
  --good:#1aae39;--warn:#c47a00;--crit:#e5484d;--crit-soft:#fdeaea;
  --shadow-sm:0 1px 2px rgba(28,26,23,.06),0 1px 3px rgba(28,26,23,.05);
  --shadow-md:0 4px 12px rgba(28,26,23,.08),0 2px 4px rgba(28,26,23,.05);
  --shadow-lg:0 12px 34px rgba(28,26,23,.14),0 4px 10px rgba(28,26,23,.08);
}
:root[data-theme="dark"]{
  --canvas:#171512;--surface:#221f1a;--surface-2:#2a2620;--surface-3:#332e27;
  --ink:#f7f4ee;--ink-2:#cbc4b9;--ink-muted:#948d82;--hairline:#37312a;
  --primary:#ff8636;--primary-hover:#ff9a55;--primary-soft:#3a2413;--on-primary:#1c1206;
  --coral:#ff8177;--coral-soft:#3a221f;--peach:#f5a463;--peach-soft:#382517;
  --lav:#a794f2;--lav-soft:#241f38;--sky:#6aabee;--sky-soft:#16253a;--mint:#4cc088;--mint-soft:#15291f;
  --good:#3fd15f;--warn:#e0a53a;--crit:#ff6b6f;--crit-soft:#3a1e1f;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);--shadow-md:0 4px 14px rgba(0,0,0,.45);--shadow-lg:0 16px 40px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
#app{font-family:var(--font);color:var(--ink);background:var(--canvas);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;line-height:1.5;position:relative}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
h1,h2,h3,p{margin:0;text-wrap:balance}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:4px}
.muted{color:var(--ink-muted)}.sec{color:var(--ink-2)}
.tnum{font-variant-numeric:tabular-nums}
.icn{width:16px;height:16px;display:inline-block;flex:none}.icn svg{width:100%;height:100%;display:block}

.floaters{position:fixed;top:14px;right:14px;display:flex;gap:8px;z-index:60}
.chipbtn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px;border-radius:var(--r-full);background:var(--surface);border:1px solid var(--hairline);box-shadow:var(--shadow-sm);font-size:13px;font-weight:500;color:var(--ink-2);transition:.15s}
.chipbtn:hover{color:var(--ink);border-color:var(--ink-muted)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:44px;padding:0 20px;border-radius:var(--r-md);font-size:15px;font-weight:600;transition:.15s;white-space:nowrap}
.btn.lg{height:50px;padding:0 26px;font-size:16px}.btn.sm{height:34px;padding:0 12px;font-size:13px;border-radius:var(--r-sm)}
.btn-primary{background:var(--primary);color:var(--on-primary);box-shadow:var(--shadow-sm)}.btn-primary:hover{background:var(--primary-hover)}
.btn-ghost{background:var(--surface-2);color:var(--ink-2)}.btn-ghost:hover{background:var(--surface-3);color:var(--ink)}
.btn-outline{background:var(--surface);border:1px solid var(--hairline);color:var(--ink)}.btn-outline:hover{border-color:var(--ink-muted)}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.linkish{color:var(--ink-muted);font-size:13px;font-weight:500;text-decoration:underline;text-underline-offset:3px}.linkish:hover{color:var(--ink-2)}

/* split (signin/onboarding) */
.split{display:grid;grid-template-columns:1.05fr 1fr;min-height:100vh}
.split-brand{background:var(--grad);color:#fff;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.bmark{font-size:20px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:10px;position:relative;z-index:2}
.blogo{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.22);display:grid;place-items:center;backdrop-filter:blur(4px)}
.split-brand h1{font-size:40px;line-height:1.08;font-weight:800;letter-spacing:-.025em;max-width:12ch;position:relative;z-index:2}
.split-brand .sub{font-size:17px;opacity:.92;max-width:34ch;margin-top:16px;position:relative;z-index:2}
.brand-orb{position:absolute;border-radius:50%;filter:blur(2px);opacity:.35}
.orb1{width:280px;height:280px;background:#ffd9a0;right:-70px;top:-60px}.orb2{width:200px;height:200px;background:#b9a7f0;left:-50px;bottom:40px;opacity:.4}
.brand-foot{position:relative;z-index:2;display:flex;gap:20px;font-size:13px;opacity:.9;flex-wrap:wrap}.brand-foot span{display:flex;align-items:center;gap:7px}
.split-main{display:flex;align-items:center;justify-content:center;padding:40px}.pane{width:100%;max-width:400px}
.dots{display:flex;gap:6px;margin-bottom:28px}.dots i{height:5px;border-radius:3px;background:var(--hairline);flex:1;transition:.3s}.dots i.on{background:var(--primary)}
.h-step{font-size:26px;font-weight:700;letter-spacing:-.02em}.p-step{color:var(--ink-2);margin-top:8px;font-size:15px}
.choices{display:flex;flex-direction:column;gap:12px;margin-top:28px}
.choice{display:flex;align-items:center;gap:16px;padding:18px;border-radius:var(--r-md);background:var(--surface);border:1.5px solid var(--hairline);text-align:left;transition:.15s;box-shadow:var(--shadow-sm)}
.choice:hover{border-color:var(--primary);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.choice .ci{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;flex:none;color:#fff}
.choice h3{font-size:17px;font-weight:650}.choice p{font-size:13.5px;color:var(--ink-muted);margin-top:2px}.choice .arw{margin-left:auto;opacity:.4}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
.tpl{position:relative;text-align:left;border-radius:var(--r-md);background:var(--surface);border:1.5px solid var(--hairline);padding:15px;transition:.15s;box-shadow:var(--shadow-sm);overflow:hidden}
.tpl:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.tpl.ai{grid-column:1/-1;background-image:linear-gradient(135deg,var(--lav-soft),var(--peach-soft));border-color:transparent}
.tpl .tico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:#fff;margin-bottom:10px}
.tpl h3{font-size:15px;font-weight:650}.tpl .td{font-size:12.5px;color:var(--ink-muted);margin-top:3px;line-height:1.4}
.tpl .prev{margin-top:11px;display:flex;flex-direction:column;gap:4px}
.tpl .prev .ph{font-size:10.5px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.05em}
.tpl .prev .pt{font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:6px}
.tpl .prev .pt .dot{width:11px;height:11px;border-radius:3px;border:1.5px solid var(--ink-muted);flex:none}
.ai-badge{position:absolute;top:12px;right:12px;font-size:11px;font-weight:700;color:var(--lav)}
.field{margin-top:18px}.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink-2)}
.inp{width:100%;height:46px;padding:0 14px;border-radius:var(--r-md);background:var(--surface);border:1.5px solid var(--hairline);font-size:15px;transition:.15s}
.inp:focus{border-color:var(--primary);outline:none}textarea.inp{height:auto;padding:12px 14px;resize:vertical;min-height:72px;line-height:1.5}
.hint{font-size:12.5px;color:var(--ink-muted);margin-top:6px}
.emailchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.echip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border-radius:var(--r-full);padding:4px 6px 4px 10px;font-size:12.5px}
.echip button{width:16px;height:16px;border-radius:50%;background:var(--surface-3);color:var(--ink-muted);display:grid;place-items:center;font-size:11px}
.ai-build{margin-top:26px;display:flex;flex-direction:column;align-items:center;gap:16px;padding:28px;border-radius:var(--r-md);background:var(--lav-soft)}
.ai-spinner{width:44px;height:44px;border-radius:50%;background:var(--grad);-webkit-mask:radial-gradient(farthest-side,transparent 58%,#000 60%);mask:radial-gradient(farthest-side,transparent 58%,#000 60%);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-draft-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--hairline);margin-top:7px;font-size:13.5px}
.ai-draft-row .drm{margin-left:auto;color:var(--ink-muted)}
.ai-phase-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--lav);margin:14px 0 2px}
.invite-hero{width:64px;height:64px;border-radius:16px;background:var(--grad);display:grid;place-items:center;color:#fff;margin-bottom:20px}

/* shell */
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.side{background:var(--grad);color:#fff;padding:14px;display:flex;flex-direction:column;gap:3px;position:relative}
.side-ws{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-md);background:rgba(255,255,255,.16);cursor:pointer;transition:.15s}
.side-ws:hover{background:rgba(255,255,255,.24)}
.ws-ava{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.28);display:grid;place-items:center;font-weight:800;font-size:14px;flex:none}
.ws-name{font-weight:650;font-size:14px;line-height:1.15}.ws-kind{font-size:11px;opacity:.85}
.side-sec{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.72;padding:14px 10px 5px}
.nav-i{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:var(--r-sm);font-size:14px;font-weight:500;opacity:.92;transition:.12s;cursor:pointer}
.nav-i:hover{background:rgba(255,255,255,.15);opacity:1}.nav-i.on{background:rgba(255,255,255,.22);opacity:1;font-weight:600}
.nav-i .badge{margin-left:auto;background:rgba(255,255,255,.28);border-radius:var(--r-full);font-size:11px;padding:1px 7px;font-weight:700}
.side-invite{margin-top:auto;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:var(--r-md);background:rgba(255,255,255,.16);font-size:13px;font-weight:600;transition:.15s}
.side-invite:hover{background:rgba(255,255,255,.26)}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{min-height:58px;border-bottom:1px solid var(--hairline);background:var(--surface);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:20}
.hamb{display:none}
.crumb{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink-2)}.crumb b{color:var(--ink);font-weight:650}.crumb .sep{opacity:.5}
.searchbar{margin-left:8px;flex:1;max-width:340px;height:36px;border-radius:var(--r-md);background:var(--surface-2);display:flex;align-items:center;gap:8px;padding:0 12px;color:var(--ink-muted);font-size:13.5px;cursor:text}
.tb-actions{margin-left:auto;display:flex;align-items:center;gap:6px}
.iconbtn{width:36px;height:36px;border-radius:var(--r-sm);display:grid;place-items:center;color:var(--ink-2);transition:.12s;position:relative}
.iconbtn:hover{background:var(--surface-2);color:var(--ink)}
.iconbtn .dotb{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--coral);border:1.5px solid var(--surface)}
.ava{width:30px;height:30px;border-radius:50%;background:var(--peach);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;flex:none}
.content{padding:26px 30px 96px;max-width:1080px;width:100%;margin:0 auto}
.content.wide{max-width:1240px}

.offline-bar{background:var(--warn);color:#fff;font-size:13px;font-weight:600;padding:7px 22px;display:flex;align-items:center;gap:9px}
.readonly-bar{background:var(--sky-soft);color:var(--sky);font-size:13px;font-weight:600;padding:7px 22px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--hairline)}

.hi{font-size:30px;font-weight:750;letter-spacing:-.025em}
.hi.sm{font-size:24px}
.wave{display:inline-block;animation:wave 2s ease-in-out 1}@keyframes wave{0%,100%{transform:rotate(0)}25%{transform:rotate(16deg)}75%{transform:rotate(-8deg)}}
.subhi{color:var(--ink-2);margin-top:6px;font-size:15px}
.nudge{margin-top:18px;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-md);background:var(--primary-soft);border:1px solid color-mix(in srgb,var(--primary) 25%,transparent)}
.nudge .pct{font-weight:700;color:var(--primary);font-size:13px;white-space:nowrap}
.nudge-steps{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--ink-2)}
.nudge-steps .s{display:flex;align-items:center;gap:6px}.nudge-steps .done{color:var(--ink-muted);text-decoration:line-through}
.card{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-md);box-shadow:var(--shadow-sm);overflow:hidden}
.block{margin-top:22px}
.block-h{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.block-h h2{font-size:16px;font-weight:700}.block-h .ct{font-size:12px;color:var(--ink-muted);background:var(--surface-2);padding:1px 8px;border-radius:var(--r-full);font-weight:600}
.vt{display:flex;gap:4px;background:var(--surface-2);border-radius:var(--r-full);padding:3px}
.vt button{font-size:12.5px;font-weight:600;color:var(--ink-muted);padding:5px 12px;border-radius:var(--r-full);transition:.12s}.vt button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
.trow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--hairline);transition:.1s;cursor:pointer}
.trow:last-child{border-bottom:none}.trow:hover{background:var(--surface-2)}
.check{width:19px;height:19px;border-radius:6px;border:1.8px solid var(--ink-muted);flex:none;display:grid;place-items:center;transition:.12s;color:transparent}
.check:hover{border-color:var(--primary)}
.trow.done .check{background:var(--good);border-color:var(--good);color:#fff}.trow.done .ttl{color:var(--ink-muted);text-decoration:line-through}
.ttl{font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tmeta{display:flex;align-items:center;gap:7px;flex:none}
.pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:var(--r-full);white-space:nowrap}
.pill.due{background:var(--surface-2);color:var(--ink-2)}.pill.due.over{background:var(--crit-soft);color:var(--crit)}.pill.due.soon{background:var(--peach-soft);color:var(--warn)}
.pill.prio-high{background:var(--crit-soft);color:var(--crit)}.pill.prio-low{background:var(--sky-soft);color:var(--sky)}
.pill.sample{background:var(--lav-soft);color:var(--lav)}
.pill.ws{background:var(--surface-2);color:var(--ink-2)}
.mini-ava{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:10.5px;font-weight:700;color:#fff;flex:none}
.tag-phase{font-size:11px;font-weight:600;color:var(--ink-muted)}
.phase-hd{padding:9px 14px 5px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--hairline);background:var(--surface-2)}
.qc{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--hairline);background:var(--surface-2)}
.qc .plus{width:19px;height:19px;color:var(--primary);flex:none}
.qc input{flex:1;background:none;border:none;font-size:14px;outline:none}.qc input::placeholder{color:var(--ink-muted)}
.qc-preview{display:flex;gap:6px;padding:0 14px 10px;flex-wrap:wrap}.qc-preview:empty{display:none}
.parse-chip{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:var(--r-full);display:inline-flex;gap:5px;align-items:center}
.coach{position:absolute;z-index:40;background:var(--ink);color:var(--canvas);padding:10px 13px;border-radius:var(--r-md);font-size:13px;font-weight:500;max-width:230px;box-shadow:var(--shadow-lg);line-height:1.4}
.coach:after{content:"";position:absolute;top:-6px;left:26px;width:12px;height:12px;background:var(--ink);transform:rotate(45deg)}
.coach button{margin-top:8px;font-size:12px;font-weight:700;color:var(--primary)}

/* board */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}
.col{background:var(--surface-2);border-radius:var(--r-md);padding:12px;min-height:200px}
.col-h{display:flex;align-items:center;gap:8px;margin-bottom:11px;font-size:13px;font-weight:700}.col-h .cdot{width:9px;height:9px;border-radius:50%}.col-h .cc{margin-left:auto;color:var(--ink-muted);font-weight:600;font-size:12px}
.bcard{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-sm);padding:11px 12px;box-shadow:var(--shadow-sm);margin-bottom:8px;cursor:pointer;transition:.12s}
.bcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--ink-muted)}
.bcard .bt{font-size:13.5px;font-weight:550;line-height:1.35}.bcard .bm{display:flex;align-items:center;gap:6px;margin-top:9px;flex-wrap:wrap}
.bcard .adv{margin-top:9px;font-size:11.5px;font-weight:600;color:var(--primary);display:inline-flex;align-items:center;gap:4px}

/* overview */
.ov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
.stat{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-md);padding:14px;box-shadow:var(--shadow-sm)}
.stat .sv{font-size:26px;font-weight:750;letter-spacing:-.02em;margin-top:2px}.stat .sl{font-size:12px;color:var(--ink-muted);font-weight:600}
.phase-prog{margin-top:10px;padding:14px}.pp-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--hairline)}.pp-row:last-child{border:none}
.pp-name{font-size:13.5px;font-weight:600;width:150px;flex:none}.pp-bar{flex:1;height:8px;border-radius:4px;background:var(--surface-3);overflow:hidden}.pp-bar i{display:block;height:100%;background:var(--mint);border-radius:4px}
.pp-meta{font-size:12px;color:var(--ink-muted);width:120px;text-align:right;flex:none}

/* generic list rows / projects / docs / members */

 let cls="",label;if(diff<0){cls="over";label=lang==="vi"?"Quá hạn":"Overdue";}else if(diff===0){cls="soon";label=lang==="vi"?"Hôm nay":"Today";}else if(diff===1){cls="soon";label=lang==="vi"?"Ngày mai":"Tomorrow";}else{label=dd.getDate()+" "+mon[dd.getMonth()];}
 return{cls,label};}
function initials(n){return (n||"?").split(" ").map(x=>x[0]).slice(0,2).join("").toUpperCase();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function cv(c){return "var("+c+")";}function cs(c){return "var("+c+"-soft)";}
function seedTemplate(tpl){S.tasks=[];tid=1;const def=TEMPLATES[tpl];def.phases.forEach(ph=>ph.tasks.forEach(tk=>{
  let a=null;if(S.mode==="team"&&typeof tk.a==="number")a=PEOPLE[tk.a];
  S.tasks.push({id:tid++,titleVi:tk.vi,titleEn:tk.en,title:tk[lang],phaseVi:ph.vi,phaseEn:ph.en,phase:ph[lang],status:"todo",due:daysFromNow(tk.d),priority:tk.p||"normal",assignee:a,sample:tpl!=="blank"});}));}
function seedAI(){S.tasks=[];tid=1;S.projName=AI_PLAN.proj[lang];AI_PLAN.phases.forEach(ph=>ph.tasks.forEach(tk=>{
  S.tasks.push({id:tid++,titleVi:tk.vi,titleEn:tk.en,title:tk[lang],phaseVi:ph.vi,phaseEn:ph.en,phase:ph[lang],status:"todo",due:daysFromNow(tk.d),priority:tk.p||"normal",assignee:null,sample:true});}));}
function seedInvited(){S.mode="team";S.invitedMode=true;S.wsName=lang==="vi"?"Nhóm Marketing":"Marketing Team";S.projName=lang==="vi"?"Chiến dịch Quý 3":"Q3 Campaign";S.tasks=[];tid=1;
 const items=[["Viết nội dung bài đăng","Write post copy",1,"high","You"],["Duyệt thiết kế banner","Review banner design",2,"normal","You"],["Lên lịch đăng bài","Schedule posts",4,"normal","Lan"],["Báo cáo hiệu quả tuần","Weekly performance report",5,"normal","You"]];
 const ph=lang==="vi"?"Đang chạy":"In flight";items.forEach(it=>S.tasks.push({id:tid++,titleVi:it[0],titleEn:it[1],title:lang==="vi"?it[0]:it[1],phaseVi:"Đang chạy",phaseEn:"In flight",phase:ph,status:"todo",due:daysFromNow(it[2]),priority:it[3],assignee:it[4]==="You"?t("you"):it[4],sample:false}));}
function retitle(){S.tasks.forEach(x=>{if(x.titleVi){x.title=lang==="vi"?x.titleVi:x.titleEn;x.phase=lang==="vi"?x.phaseVi:x.phaseEn;}if(x.assignee&&(x.assignee==="Bạn"||x.assignee==="You"))x.assignee=t("you");});}
function parseQuick(str){let title=str,assignee=null,priority="normal",due=null;const am=str.match(/@(\p{L}+)/u);if(am){assignee=am[1];title=title.replace(am[0],"");}
 if(/!(cao|high|p1)/i.test(str)){priority="high";title=title.replace(/!(cao|high|p1)/i,"");}else if(/!(thấp|thap|low|p3)/i.test(str)){priority="low";title=title.replace(/!(thấp|thap|low|p3)/i,"");}
 const map={"hôm nay":0,"homnay":0,"today":0,"ngày mai":1,"mai":1,"tomorrow":1};let md=false;
 for(const k in map){if(new RegExp("(^|\\s)"+k+"($|\\s)","i").test(str)){due=daysFromNow(map[k]);title=title.replace(new RegExp(k,"i"),"");md=true;break;}}
 if(!md){const wd=str.match(/\b(t[2-7]|thứ [2-7]|mon|tue|wed|thu|fri|sat|sun)\b/i);if(wd){const mm={t2:1,t3:2,t4:3,t5:4,t6:5,t7:6,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6,sun:0};let key=wd[1].toLowerCase().replace("thứ ","t");let target=mm[key.slice(0,3)]!==undefined?mm[key.slice(0,3)]:mm[key];if(target!=null){const now=new Date();let add=(target-now.getDay()+7)%7;if(add===0)add=7;due=daysFromNow(add);title=title.replace(wd[0],"");md=true;}}}
 if(!md){const dm=str.match(/\b(\d{1,2})\/(\d{1,2})\b/);if(dm){const now=new Date();let dt=new Date(now.getFullYear(),parseInt(dm[2])-1,parseInt(dm[1]));if(dt<now)dt.setFullYear(now.getFullYear()+1);due=dt;title=title.replace(dm[0],"");}}
 return{title:title.replace(/\s+/g," ").trim(),assignee,priority,due};}

}

/* planner */

 const today=new Date();const monday=new Date(today);monday.setDate(today.getDate()-((today.getDay()+6)%7));

function renderSwitcher(){const el=document.createElement("div");el.className="dropdown";el.id="switcher-el";
 const orgSec=S.org?`<div class="dd-sec"><span class="icn" style="width:11px;height:11px;display:inline-block;vertical-align:-1px">${I.building}</span> ${esc(S.org)}</div><div class="dd-i on"><span class="di" style="background:var(--grad)">${initials(S.wsName)}</span>${esc(S.wsName)}</div>`
  :`<div class="dd-sec">${t("sw_standalone")}</div><div class="dd-i on"><span class="di" style="background:var(--grad)">${initials(S.wsName)}</span>${esc(S.wsName)}</div>`;
 el.innerHTML=`${orgSec}<div class="dd-i"><span class="di" style="background:var(--sky)">MK</span>${lang==="vi"?"Nhóm Marketing":"Marketing Team"}</div>
   ${S.org?"":`<div class="dd-add" data-action="modal" data-arg="createorg"><span class="icn">${I.building}</span>${t("sw_create_org")}</div>`}`;
 app.appendChild(el);}

/* modal */
function renderModal(){const scrim=document.createElement("div");scrim.className="scrim";scrim.id="modal-scrim";scrim.setAttribute("data-action","close-modal");
 let body="";
 if(S.modal==="share")body=modalShare();else if(S.modal==="invite")body=modalInvite();else if(S.modal==="telegram")body=modalTelegram();else if(S.modal==="createorg")body=modalOrg();
 const el=document.createElement("div");el.className="modal";el.id="modal-el";el.innerHTML=body;
 app.appendChild(scrim);app.appendChild(el);}
function mh(title){return `<div class="modal-h"><h2>${title}</h2><button class="iconbtn" style="margin-left:auto" data-action="close-modal"><span class="icn">${I.x}</span></button></div>`;}
function lvlSel(v){return `<select class="lvl-sel"><option ${v==='view'?'selected':''}>${t("lvl_view")}</option><option ${v==='comment'?'selected':''}>${t("lvl_comment")}</option><option ${v==='edit'?'selected':''}>${t("lvl_edit")}</option><option ${v==='full'?'selected':''}>${t("lvl_full")}</option></select>`;}
function modalShare(){return `${mh(t("share_h"))}<div class="modal-b">
  <input class="inp" placeholder="${t("share_add_ph")}"/>
  <div class="share-gen"><span class="icn" style="color:var(--sky)">${I.users}</span><div><div style="font-size:13.5px;font-weight:600">${t("share_general")}</div><div class="muted" style="font-size:12px">${t("share_gen_view")}</div></div>${lvlSel("view")}</div>
  <div class="share-row"><span class="mini-ava" style="background:var(--peach)">${t("you")[0]}</span><div><div style="font-weight:600">${t("you")}</div></div><span class="grant-tag grant-dir" style="margin-left:auto">${t("grant_direct")}</span>${lvlSel("full")}</div>
  <div class="share-row"><span class="mini-ava" style="background:var(--coral)">M</span><div><div style="font-weight:600">Minh</div></div><span class="grant-tag grant-inh" style="margin-left:auto">${t("grant_inherited")}</span>${lvlSel("edit")}</div>
  <div class="share-row"><span class="mini-ava" style="background:var(--lav)">${I.users.replace('width="24"','')}</span><div><div style="font-weight:600">${lang==="vi"?"Nhóm Thiết kế":"Design team"}</div></div><span class="grant-tag grant-team" style="margin-left:auto">${t("grant_team")}</span>${lvlSel("comment")}</div>
  <p class="hint" style="margin-top:10px"><span class="icn" style="width:13px;height:13px;color:var(--lav);display:inline-block;vertical-align:-2px">${I.lock}</span> ${t("guest_note")}</p>
  <div style="margin-top:16px;display:flex;justify-content:flex-end"><button class="btn btn-primary sm" data-action="save-share">${lang==="vi"?"Xong":"Done"}</button></div></div>`;}
function modalInvite(){return `${mh(t("invite_h"))}<div class="modal-b">
  <div class="field" style="margin-top:0"><label>${t("invite_label")}</label><textarea class="inp" placeholder="${t("invite_ph")}" rows="2"></textarea></div>
  <div class="field"><label>${t("invite_role")}</label><select class="inp"><option>${t("role_member")}</option><option>${t("role_admin")}</option><option>${t("role_guest")}</option></select></div>
  <div style="margin-top:18px;display:flex;justify-content:flex-end"><button class="btn btn-primary" data-action="do-invite">${t("send_invites")}</button></div></div>`;}
function modalTelegram(){return `${mh(t("tg_h"))}<div class="modal-b" style="text-align:center">
  <div class="invite-hero" style="margin-inline:auto;background:#2aabee">${I.tg}</div>
  <p class="sec" style="font-size:14px">${t("tg_p")}</p>
  <div style="text-align:left;margin-top:16px;display:flex;flex-direction:column;gap:8px">
   <div class="share-row"><span class="mini-ava" style="background:var(--sky)">1</span>${t("tg_step1")}</div>
   <div class="share-row"><span class="mini-ava" style="background:var(--sky)">2</span>${t("tg_step2")}</div>
   <div class="share-row"><span class="mini-ava" style="background:var(--sky)">3</span>${t("tg_step3")}</div></div>
  <div class="inp" style="display:flex;align-items:center;justify-content:center;font-weight:700;letter-spacing:.2em;font-size:18px;margin-top:8px">VRC-4821</div>
  <div style="margin-top:16px"><button class="btn btn-primary" data-action="do-tg">${t("tg_connect_btn")}</button></div></div>`;}
function modalOrg(){return `${mh(t("org_h"))}<div class="modal-b">
  <p class="sec" style="font-size:14px">${t("org_p")}</p>
  <div class="field"><label>${t("org_name")}</label><input class="inp" data-field="orgname" placeholder="${lang==="vi"?"VD: Công ty Vieroc":"e.g. Vieroc Inc."}"/></div>
  <p class="hint"><span class="icn" style="width:13px;height:13px;color:var(--warn);display:inline-block;vertical-align:-2px">${I.lock}</span> ${t("org_note")}</p>
  <div style="margin-top:18px;display:flex;justify-content:flex-end"><button class="btn btn-primary" data-action="do-org">${t("org_create")}</button></div></div>`;}

/* toast */
let tt=null;function toast(m){const o=document.getElementById("toast-el");if(o)o.remove();const el=document.createElement("div");el.className="toast";el.id="toast-el";el.innerHTML=`<span class="icn" style="color:var(--mint);width:15px;height:15px">${I.check}</span>${m}`;app.appendChild(el);clearTimeout(tt);tt=setTimeout(()=>el.remove(),2000);}

/* ---------- navigation helper ---------- */
function goApp(nav){S.screen="app";S.nav=nav;S.switcherOpen=false;S.mobileNav=false;render();}
function withLoading(fn){S.loading=true;render();setTimeout(()=>{S.loading=false;fn();render();},480);}

/* ---------- jump (prototype map) ---------- */
function jump(target){
 S.modal=null;S.drawer=null;S.switcherOpen=false;
 switch(target){
  case"signin":resetAll();return;
  case"personal":resetAll();S.mode="personal";S.wsName=lang==="vi"?"Không gian của bạn":"Your space";S.screen="ob-template";break;
  case"team":resetAll();S.mode="team";S.wsName=lang==="vi"?"Nhóm của bạn":"Your team";S.screen="ob-template";break;
  case"ai":S.screen="ai-describe";break;
  case"invited":S.screen="invite-accept";break;
  case"invexp":S.screen="invite-expired";break;
  case"home":ensureApp();goApp("home");return;
  case"mywork":case"inbox":case"planner":case"projects":case"docs":case"settings":ensureApp();goApp(target);return;
  case"overview":ensureApp();S.nav="home";S.projView="overview";goApp("home");return;
  case"list":ensureApp();S.nav="home";S.projView="list";goApp("home");return;
  case"board":ensureApp();S.nav="home";S.projView="board";goApp("home");return;
  case"drawer":ensureApp();S.nav="home";S.projView="list";S.screen="app";if(S.tasks[0])S.drawer=S.tasks[0].id;render();return;
  case"share":ensureApp();S.screen="app";S.modal="share";render();return;
  case"invite":ensureApp();S.screen="app";S.modal="invite";render();return;
  case"telegram":ensureApp();S.screen="app";S.modal="telegram";render();return;
  case"createorg":ensureApp();S.screen="app";S.modal="createorg";render();return;
  case"switch":ensureApp();S.screen="app";S.switcherOpen=true;render();return;
  case"loading":ensureApp();S.screen="app";S.nav="home";withLoading(()=>{});return;
  case"emptyinbox":ensureApp();S.inboxEmpty=true;goApp("inbox");return;
  case"forbidden":ensureApp();goApp("forbidden");return;
  case"readonly":S.guest=!S.guest;ensureApp();S.screen="app";render();return;
  case"offline":S.offline=!S.offline;if(!S.offline)toast(t("toast_synced"));ensureApp();S.screen="app";render();return;
 }
 render();
}
function ensureApp(){if(!S.tasks.length){S.mode=S.mode||"team";S.wsName=S.wsName||(lang==="vi"?"Nhóm của bạn":"Your team");S.tpl="freelance-client";S.projName=TEMPLATES["freelance-client"].proj[lang];seedTemplate("freelance-client");}}

/* ---------- events ---------- */
app.addEventListener("click",e=>{const el=e.target.closest("[data-action]");if(!el)return;const a=el.getAttribute("data-action"),arg=el.getAttribute("data-arg");if(el.getAttribute("data-stop"))e.stopPropagation();
 switch(a){
  case"lang-toggle":lang=lang==="vi"?"en":"vi";retitle();render();break;
  case"theme-toggle":theme=theme==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",theme);render();break;
  case"restart":resetAll();break;
  case"signin":S.screen="ob-mode";render();break;
  case"accept-invite":seedInvited();goApp("home");break;
  case"pick-mode":S.mode=arg;S.wsName=arg==="personal"?(lang==="vi"?"Không gian của bạn":"Your space"):(lang==="vi"?"Nhóm của bạn":"Your team");S.screen="ob-template";render();break;
  case"skip-ob":S.mode="personal";S.wsName=lang==="vi"?"Không gian của bạn":"Your space";S.tpl="blank";S.projName=TEMPLATES.blank.proj[lang];seedTemplate("blank");goApp("home");break;
  case"pick-template":S.tpl=arg;S.aiText="";S.projName=TEMPLATES[arg].proj[lang];seedTemplate(arg);S.screen="ob-name";render();break;
  case"goto":S.screen=arg;render();break;
  case"jump":jump(arg);break;
  case"ai-build":S.screen="ai-loading";{const p=stage.querySelector(".pane");if(p)p.innerHTML=`<div class="dots"><i class="on"></i><i class="on"></i><i></i></div><div class="ai-build"><div class="ai-spinner"></div><div style="font-weight:600">${t("ai_building")}</div><div class="muted" style="font-size:13px;text-align:center">${esc(S.aiText||t("ai_ph"))}</div></div>`;}setTimeout(()=>{seedAI();S.tpl=null;S.screen="ai-review";render();},1500);break;
  case"ai-apply":S.screen="ob-name";render();break;
  case"rm-email":S.invitedEmails.splice(parseInt(arg),1);render();break;
  case"create-project":goApp("home");break;
  case"nav":S.mobileNav=false;if(arg===S.nav){render();break;}S.nav=arg;S.switcherOpen=false;if(arg==="inbox")S.inboxEmpty=false;withLoading(()=>{if(arg==="home")S.projView="list";});break;
  case"pview":S.projView=arg;render();break;
  case"toggle-done":toggleDone(parseInt(arg));break;
  case"advance":advance(parseInt(arg));break;
  case"open-task":S.drawer=parseInt(arg);render();break;
  case"close-drawer":S.drawer=null;render();break;
  case"set-status":{const[id,st]=arg.split(":");setStatus(parseInt(id),st);break;}
  case"assign-me":{const x=S.tasks.find(z=>z.id===parseInt(arg));if(x){x.assignee=t("you");S.act.a2=true;}render();break;}
  case"toggle-chk":{const[id,i]=arg.split(":");const l=S.checklist[id]||[{txt:lang==="vi"?"Tiêu chí hoàn thành":"Acceptance criteria",done:false}];l[i].done=!l[i].done;S.checklist[id]=l;render();break;}
  case"clear-samples":S.tasks=S.tasks.filter(x=>!x.sample);S.drawer=null;render();break;
  case"dismiss-coach":S.coach=false;render();break;
  case"toggle-act":S.actMin=!S.actMin;render();break;
  case"toggle-pmap":S.pmapMin=!S.pmapMin;render();break;
  case"close-nudge":S.nudgeOpen=false;render();break;
  case"toggle-switcher":S.switcherOpen=!S.switcherOpen;render();break;
  case"toggle-mobilenav":S.mobileNav=!S.mobileNav;render();break;
  case"close-mobilenav":S.mobileNav=false;render();break;
  case"modal":S.modal=arg;S.drawer=(arg==="share"&&S.drawer)?S.drawer:S.drawer;render();break;
  case"close-modal":S.modal=null;render();break;
  case"open-project":goApp("home");break;
  case"open-forbidden":goApp("forbidden");break;
  case"open-doc":S.nav="doc-read";render();break;
  case"save-share":S.modal=null;toast(t("toast_share"));render();break;
  case"do-invite":S.modal=null;S.invitedEmails=(S.invitedEmails||[]).concat(["teammate@example.com"]);S.act.a4=true;toast(t("toast_invited"));render();break;
  case"do-tg":S.modal=null;toast(t("toast_tg"));render();break;
  case"do-org":{const v=(document.querySelector('[data-field="orgname"]')||{}).value;S.org=v||(lang==="vi"?"Tổ chức của bạn":"Your organization");S.modal=null;toast(t("toast_org"));render();break;}
  case"noop":break;
 }});
app.addEventListener("input",e=>{const el=e.target.closest("[data-field]");if(!el)return;const f=el.getAttribute("data-field");
 if(f==="wsName")S.wsName=el.value;else if(f==="projName")S.projName=el.value;else if(f==="aitext")S.aiText=el.value;
 else if(f==="qc"){if(S.coach){S.coach=false;const c=document.getElementById("coach-el");if(c)c.remove();}qcPreview(el.value);}});
app.addEventListener("keydown",e=>{const el=e.target.closest("[data-field]");if(!el)return;const f=el.getAttribute("data-field");
 if(f==="qc"&&e.key==="Enter"){e.preventDefault();commitQuick(el);}
 if(f==="inviteinp"&&(e.key==="Enter"||e.key===",")){e.preventDefault();const v=el.value.trim().replace(/,$/,"");if(v){S.invitedEmails=(S.invitedEmails||[]).concat([v]);el.value="";render();requestAnimationFrame(()=>{const i=document.querySelector('[data-field="inviteinp"]');if(i)i.focus();});}}
 if(f==="cmt"&&e.key==="Enter"){e.preventDefault();const id=el.getAttribute("data-tid");const v=el.value.trim();if(v){S.comments[id]=(S.comments[id]||[]).concat([v]);el.value="";toast(t("toast_comment"));render();}}
 if(f==="subinp"&&e.key==="Enter"){e.preventDefault();const id=el.getAttribute("data-tid");const v=el.value.trim();if(v){S.subtasks[id]=(S.subtasks[id]||[]).concat([{txt:v,done:false}]);el.value="";render();}}});

function qcPreview(val){const box=document.getElementById("qcpreview");if(!box)return;const p=parseQuick(val);let c="";
 if(p.assignee)c+=`<span class="parse-chip" style="background:${cs(personDot(p.assignee))};color:${cv(personDot(p.assignee))}"><span class="icn" style="width:12px;height:12px">${I.user}</span>${p.assignee}</span>`;
 if(p.due){const dm=dueMeta(p.due);c+=`<span class="parse-chip" style="background:var(--peach-soft);color:var(--warn)"><span class="icn" style="width:12px;height:12px">${I.cal}</span>${dm.label}</span>`;}
 if(p.priority==="high")c+=`<span class="parse-chip prio-high">${t("prio_high")}</span>`;if(p.priority==="low")c+=`<span class="parse-chip prio-low">${t("prio_low")}</span>`;
 box.innerHTML=c;}
function commitQuick(el){const val=el.value.trim();if(!val)return;const p=parseQuick(val);if(!p.title)p.title=val;
 const first=S.tasks[0];const task={id:tid++,title:p.title,titleVi:p.title,titleEn:p.title,phase:first?first.phase:(lang==="vi"?"Việc cần làm":"To do"),phaseVi:first?first.phaseVi:"Việc cần làm",phaseEn:first?first.phaseEn:"To do",status:"todo",due:p.due,priority:p.priority,assignee:p.assignee,sample:false};
 S.tasks.unshift(task);S.act.a1=true;if(p.due||p.assignee)S.act.a2=true;el.value="";const box=document.getElementById("qcpreview");if(box)box.innerHTML="";
 toast(S.offline?t("toast_offpend"):t("toast_created"));render();requestAnimationFrame(()=>{const q=document.getElementById("qcinp");if(q)q.focus();});}
function toggleDone(id){const x=S.tasks.find(z=>z.id===id);if(!x||!canWrite())return;x.status=x.status==="done"?"todo":"done";S.act.a3=true;toast(S.offline?t("toast_offpend"):t("toast_status"));render();}
function advance(id){const x=S.tasks.find(z=>z.id===id);if(!x||!canWrite())return;x.status=x.status==="todo"?"doing":"done";S.act.a3=true;toast(S.offline?t("toast_offpend"):t("toast_status"));render();}
function setStatus(id,st){const x=S.tasks.find(z=>z.id===id);if(!x||!canWrite())return;x.status=st;S.act.a3=true;render();}
function resetAll(){Object.assign(S,{screen:"signin",nav:"home",projView:"list",mode:null,invitedMode:false,guest:false,offline:false,wsName:"",projName:"",tasks:[],invitedEmails:[],org:null,drawer:null,modal:null,switcherOpen:false,coach:true,nudgeOpen:true,act:{a1:false,a2:false,a3:false,a4:false},loading:false,mobileNav:false,comments:{},subtasks:{},checklist:{},inboxEmpty:false,docsEmpty:false,aiText:""});render();}

render();
})();
</script>
